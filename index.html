<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MarinMagic</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@400;800&family=Carter+One&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
  <style>
    body { margin: 0; background: #fff; color: #111827; font-family: 'Public Sans', Arial, sans-serif; }
    .container { max-width: 1100px; margin: 0 auto; padding: 32px 20px 120px; }
    h1 { margin: 0 0 28px; display: flex; align-items: center; gap: 10px; color: #000; font-size: 2.6rem; line-height: 1; }
    .title-text { font-family: 'Carter One', cursive; }
    .icon-inline { display: inline-flex; align-items: center; justify-content: center; }
    .icon-inline i { font-size: 2rem; color: #000; line-height: 1; transform-origin: center center; }
    .card { background: #fff; border: 1px solid #dbe4dd; border-radius: 16px; padding: 20px; margin-bottom: 20px; }
    label, strong { font-weight: 800; color: #111827; }
    select, input {
      width: 100%; min-height: 48px; padding: 12px; margin: 8px 0 12px;
      border: 1px solid #94a3b8; border-radius: 10px; box-sizing: border-box;
      font: inherit; background: #fff; color: #111827;
    }
    .buttons { display: flex; gap: 12px; flex-wrap: wrap; margin-bottom: 32px; }
    button {
      min-height: 48px; padding: 12px 18px; border: none; border-radius: 10px;
      font-weight: 800; font-family: inherit; cursor: pointer;
    }
    .primary { background: #1c75bc; color: #fff; }
    .dark { background: #111827; color: #fff; }
    .light { background: #e5e7eb; color: #111827; }
    #status { margin: 12px 0 0; color: #475569; }
    #preview, #htmlPreview { border: 1px solid #94a3b8; border-radius: 12px; padding: 16px; min-height: 200px; margin-top: 8px; }
    #htmlPreview { display: block; white-space: pre-wrap; word-break: break-word; background: #f8fafc; overflow: auto; }
    #preview p.alpha-links { margin-top: 0; margin-bottom: 18px; }
    #preview p.alpha-links a { color: #0f4c81; font-weight: 800; text-decoration: underline; text-underline-offset: 2px; }
    #columnCheckboxes { display: grid; gap: 8px; margin-top: 10px; }
    .drag-item {
      display: flex; align-items: center; justify-content: flex-start; gap: 12px;
      min-height: 48px; padding: 12px 14px; border: 1px solid #94a3b8; border-radius: 10px;
      background: #fff; cursor: grab; user-select: none; text-align: left; width: 100%; box-sizing: border-box;
    }
    .drag-item input { margin: 0; width: 18px; min-width: 18px; height: 18px; flex: 0 0 18px; }
    .drag-item span { flex: 1 1 auto; text-align: left; line-height: 1.3; }
    .drag-item.dragging { opacity: 0.65; box-shadow: 0 10px 24px rgba(0, 0, 0, 0.18); border-color: #1c75bc; background: #f8fbff; }
    .drag-item.drag-over { border-color: #1c75bc; box-shadow: 0 0 0 3px rgba(28, 117, 188, 0.22), 0 10px 24px rgba(0, 0, 0, 0.12); background: #f4f9ff; }
    .preview-tabs { display: inline-flex; gap: 4px; padding: 4px; margin-top: 8px; margin-bottom: 12px; background: #f3f4f6; border: 1px solid #cbd5e1; border-radius: 999px; }
    .tab-button { min-height: 44px; padding: 10px 16px; border: none; border-radius: 999px; background: transparent; color: #1f2937; font-weight: 800; font-family: inherit; cursor: pointer; }
    .tab-button.active { background: #111827; color: #fff; }
    .preview-pane { position: relative; }
    .pane-toolbar { display: flex; justify-content: flex-end; margin-bottom: 8px; }
    .icon-copy-btn {
      width: 44px; height: 44px; border: 1px solid #94a3b8; border-radius: 10px; background: #fff;
      color: #374151; display: inline-flex; align-items: center; justify-content: center; cursor: pointer;
    }
    .icon-copy-btn:hover { background: #f9fafb; }
    .feedback-button { position: fixed; right: 20px; bottom: 20px; display: inline-flex; align-items: center; gap: 8px; min-height: 48px; background: #fff; color: #000; border: 1px solid #000; border-radius: 999px; padding: 12px 16px; text-decoration: none; font-weight: 800; box-shadow: 0 6px 18px rgba(0,0,0,0.08); z-index: 1000; }
    a, button, input, select, .drag-item { transition: box-shadow 0.12s ease, border-color 0.12s ease, background-color 0.12s ease; }
    a:focus-visible, button:focus-visible, input:focus-visible, select:focus-visible, .drag-item:focus-visible {
      outline: 3px solid #1d4ed8; outline-offset: 2px;
    }
    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after { scroll-behavior: auto !important; transition: none !important; animation: none !important; }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1><span class="icon-inline"><i class="fa-solid fa-wand-magic-sparkles"></i></span><span class="title-text">MarinMagic</span></h1>

    <div class="card">
      <label for="fileTypeSelect">File type</label>
      <select id="fileTypeSelect">
        <option value="csv">.csv</option>
        <option value="xlsx">.xlsx</option>
        <option value="json">.json</option>
      </select>

      <label for="fileInput">Upload file</label>
      <input id="fileInput" type="file" accept=".csv,.xlsx,.xls,.json,application/json,text/csv" />
      <p id="status">Select a file to begin.</p>
    </div>

    <div id="mappingPanel" class="card" style="display:none;">
      <h2>Field mapping</h2>
      <label for="h2Select">Select heading column</label>
      <select id="h2Select"></select>
      <label for="headingLevelSelect">Top-level</label>
      <select id="headingLevelSelect">
        <option value="h2" selected>h2</option>
        <option value="h3">h3</option>
        <option value="h4">h4</option>
        <option value="h5">h5</option>
        <option value="h6">h6</option>
      </select>
      <strong>Select columns for list</strong>
      <p>Drag to reorder list items.</p>
      <div id="columnCheckboxes"></div>
    </div>

    <div class="buttons">
      <button id="generateBtn" class="primary" type="button">Generate preview</button>
      <button id="downloadBtn" class="dark" type="button">Download HTML</button>
      <button id="resetBtn" class="light" type="button">Reset</button>
    </div>

    <div class="card">
      <h2>Preview</h2>
      <div class="preview-tabs" role="tablist" aria-label="Preview modes">
        <button id="viewTextBtn" class="tab-button active" type="button" role="tab" aria-selected="true" aria-controls="textPane">Text</button>
        <button id="viewHtmlBtn" class="tab-button" type="button" role="tab" aria-selected="false" aria-controls="htmlPane">HTML</button>
      </div>

      <div id="textPane" class="preview-pane" role="tabpanel" aria-labelledby="viewTextBtn">
        <div class="pane-toolbar">
          <button id="copyPreviewBtn" class="icon-copy-btn" type="button" aria-label="Copy rich text" title="Copy rich text">
            <i class="fa-regular fa-copy"></i>
          </button>
        </div>
        <div id="preview"></div>
      </div>

      <div id="htmlPane" class="preview-pane" style="display:none;" role="tabpanel" aria-labelledby="viewHtmlBtn">
        <div class="pane-toolbar">
          <button id="copyHtmlBtn" class="icon-copy-btn" type="button" aria-label="Copy HTML source" title="Copy HTML source">
            <i class="fa-regular fa-copy"></i>
          </button>
        </div>
        <pre id="htmlPreview"></pre>
      </div>
    </div>
  </div>

  <a class="feedback-button" href="https://form.asana.com/?k=qVUT83d5DBmlDiIyi-WAyQ&d=23133298259496" target="_blank" rel="noreferrer"><i class="fa-solid fa-circle-plus"></i> Feedback</a>

  <script>
    const fileInput = document.getElementById('fileInput');
    const fileTypeSelect = document.getElementById('fileTypeSelect');
    const status = document.getElementById('status');
    const mappingPanel = document.getElementById('mappingPanel');
    const h2Select = document.getElementById('h2Select');
    const headingLevelSelect = document.getElementById('headingLevelSelect');
    const columnCheckboxes = document.getElementById('columnCheckboxes');
    const preview = document.getElementById('preview');
    const htmlPreview = document.getElementById('htmlPreview');
    const textPane = document.getElementById('textPane');
    const htmlPane = document.getElementById('htmlPane');
    const viewTextBtn = document.getElementById('viewTextBtn');
    const viewHtmlBtn = document.getElementById('viewHtmlBtn');
    const copyPreviewBtn = document.getElementById('copyPreviewBtn');
    const copyHtmlBtn = document.getElementById('copyHtmlBtn');
    const generateBtn = document.getElementById('generateBtn');
    const downloadBtn = document.getElementById('downloadBtn');
    const resetBtn = document.getElementById('resetBtn');

    let headers = [];
    let rows = [];
    let output = '';

    function clean(v) { return v == null ? '' : String(v).trim(); }
    function esc(v) {
      return clean(v).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/\"/g, '&quot;');
    }

    function parseCsv(text) {
      const out = [];
      let row = [];
      let cell = '';
      let inQuotes = false;
      const normalized = text.replace(/\r\n/g, '\n').replace(/\r/g, '\n');
      for (let i = 0; i < normalized.length; i += 1) {
        const ch = normalized[i];
        const next = normalized[i + 1];
        if (ch === '"') {
          if (inQuotes && next === '"') { cell += '"'; i += 1; }
          else { inQuotes = !inQuotes; }
        } else if (ch === ',' && !inQuotes) {
          row.push(cell); cell = '';
        } else if (ch === '\n' && !inQuotes) {
          row.push(cell); out.push(row); row = []; cell = '';
        } else {
          cell += ch;
        }
      }
      if (cell !== '' || row.length) { row.push(cell); out.push(row); }
      return out.filter(r => Array.isArray(r) && r.some(v => clean(v)));
    }

    function parseJson(text) {
      const data = JSON.parse(text);
      if (!Array.isArray(data)) throw new Error('JSON must be an array of objects.');
      const keys = [...new Set(data.flatMap(item => Object.keys(item || {})))];
      return [keys, ...data.map(item => keys.map(key => item && item[key] != null ? String(item[key]) : ''))];
    }

    function updateAccept() {
      if (fileTypeSelect.value === 'csv') fileInput.accept = '.csv,text/csv';
      else if (fileTypeSelect.value === 'xlsx') fileInput.accept = '.xlsx,.xls,application/vnd.openxmlformats-officedocument.spreadsheetml.sheet,application/vnd.ms-excel';
      else fileInput.accept = '.json,application/json';
    }

    function enableDragDrop() {
      let dragged = null;
      [...columnCheckboxes.querySelectorAll('.drag-item')].forEach(item => {
        item.addEventListener('dragstart', () => { dragged = item; item.classList.add('dragging'); });
        item.addEventListener('dragend', () => {
          item.classList.remove('dragging');
          [...columnCheckboxes.querySelectorAll('.drag-item')].forEach(el => el.classList.remove('drag-over'));
          dragged = null;
        });
        item.addEventListener('dragover', event => {
          event.preventDefault();
          [...columnCheckboxes.querySelectorAll('.drag-item')].forEach(el => { if (el !== item) el.classList.remove('drag-over'); });
          if (dragged && dragged !== item) item.classList.add('drag-over');
        });
        item.addEventListener('dragleave', () => item.classList.remove('drag-over'));
        item.addEventListener('drop', event => {
          event.preventDefault();
          item.classList.remove('drag-over');
          if (!dragged || dragged === item) return;
          const items = [...columnCheckboxes.querySelectorAll('.drag-item')];
          const draggedIndex = items.indexOf(dragged);
          const targetIndex = items.indexOf(item);
          if (draggedIndex < targetIndex) columnCheckboxes.insertBefore(dragged, item.nextSibling);
          else columnCheckboxes.insertBefore(dragged, item);
        });
      });
    }

    function renderMapping() {
      h2Select.innerHTML = '';
      columnCheckboxes.innerHTML = '';
      headers.forEach((header, index) => {
        const label = clean(header) || `Column ${index + 1}`;
        const option = document.createElement('option');
        option.value = String(index);
        option.textContent = label;
        h2Select.appendChild(option);

        const row = document.createElement('label');
        row.className = 'drag-item';
        row.draggable = true;
        const checkbox = document.createElement('input');
        checkbox.type = 'checkbox';
        checkbox.value = String(index);
        checkbox.checked = index !== 0;
        const text = document.createElement('span');
        text.textContent = label;
        row.appendChild(checkbox);
        row.appendChild(text);
        columnCheckboxes.appendChild(row);
      });
      enableDragDrop();
    }

    function build() {
      const headingIndex = Number(h2Select.value);
      if (Number.isNaN(headingIndex)) throw new Error('No heading selected');
      const headingTag = headingLevelSelect.value || 'h2';
      const selectedColumns = [...columnCheckboxes.querySelectorAll('input:checked')]
        .map(input => Number(input.value))
        .filter(index => index !== headingIndex);

      const records = rows
        .map(row => ({ heading: clean(row[headingIndex]), row }))
        .filter(record => record.heading)
        .sort((a, b) => a.heading.localeCompare(b.heading, undefined, { sensitivity: 'base' }));

      const letters = [];
      records.forEach(record => {
        const first = record.heading.charAt(0).toUpperCase() || '#';
        const letter = /^[A-Z]$/.test(first) ? first : '#';
        if (!letters.includes(letter)) letters.push(letter);
      });
      letters.sort((a, b) => {
        if (a === '#') return -1;
        if (b === '#') return 1;
        return a.localeCompare(b);
      });

      const nav = letters.length
        ? `<p class="alpha-links">${letters.map(letter => `<a href="#section-${letter === '#' ? 'other' : letter}">${letter}</a>`).join(' | ')}</p>`
        : '';

      const seen = new Set();
      const html = records.map(record => {
        const first = record.heading.charAt(0).toUpperCase() || '#';
        const letter = /^[A-Z]$/.test(first) ? first : '#';
        const anchorId = `section-${letter === '#' ? 'other' : letter}`;
        const headingId = seen.has(letter) ? '' : ` id="${anchorId}"`;
        seen.add(letter);
        const listItems = selectedColumns
          .map(index => clean(record.row[index]) ? `<li>${esc(headers[index])}: ${esc(record.row[index])}</li>` : '')
          .join('');
        return `<${headingTag}${headingId}>${esc(record.heading)}</${headingTag}><ul>${listItems}</ul>`;
      }).join('');

      output = `${nav}${html}`;
      preview.innerHTML = output;
      htmlPreview.textContent = output;
    }

    function loadTable(table) {
      headers = table[0] || [];
      rows = table.slice(1).filter(row => Array.isArray(row) && row.some(value => clean(value)));
      if (!headers.length || !rows.length) {
        mappingPanel.style.display = 'none';
        preview.innerHTML = '';
        htmlPreview.textContent = '';
        status.textContent = 'No usable data found.';
        return;
      }
      mappingPanel.style.display = 'block';
      renderMapping();
      build();
      status.textContent = 'Preview generated.';
    }

    fileTypeSelect.addEventListener('change', () => {
      updateAccept();
      status.textContent = 'Select a file to begin.';
      fileInput.value = '';
      preview.innerHTML = '';
      htmlPreview.textContent = '';
      mappingPanel.style.display = 'none';
      headers = [];
      rows = [];
      output = '';
    });

    fileInput.addEventListener('change', event => {
      const file = event.target.files && event.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      status.textContent = `Reading ${fileTypeSelect.value}...`;
      if (fileTypeSelect.value === 'xlsx') {
        reader.onload = e => {
          try {
            const workbook = XLSX.read(e.target.result, { type: 'array' });
            const sheet = workbook.Sheets[workbook.SheetNames[0]];
            const table = XLSX.utils.sheet_to_json(sheet, { header: 1, defval: '' });
            loadTable(table);
          } catch (error) {
            console.error(error);
            status.textContent = 'Could not read the XLSX file.';
          }
        };
        reader.readAsArrayBuffer(file);
      } else {
        reader.onload = e => {
          try {
            const text = String(e.target.result || '');
            const table = fileTypeSelect.value === 'json' ? parseJson(text) : parseCsv(text);
            loadTable(table);
          } catch (error) {
            console.error(error);
            status.textContent = `Could not read the ${fileTypeSelect.value.toUpperCase()} file.`;
          }
        };
        reader.readAsText(file);
      }
    });

    generateBtn.onclick = () => {
      try {
        build();
        status.textContent = 'Preview generated.';
      } catch (error) {
        console.error(error);
        status.textContent = 'Could not generate preview.';
      }
    };

    function setActivePane(mode) {
      const showText = mode === 'text';
      textPane.style.display = showText ? 'block' : 'none';
      htmlPane.style.display = showText ? 'none' : 'block';
      viewTextBtn.classList.toggle('active', showText);
      viewHtmlBtn.classList.toggle('active', !showText);
      viewTextBtn.setAttribute('aria-selected', showText ? 'true' : 'false');
      viewHtmlBtn.setAttribute('aria-selected', showText ? 'false' : 'true');
      textPane.setAttribute('aria-hidden', showText ? 'false' : 'true');
      htmlPane.setAttribute('aria-hidden', showText ? 'true' : 'false');
    }

    viewTextBtn.onclick = () => setActivePane('text');
    viewHtmlBtn.onclick = () => setActivePane('html');

    copyPreviewBtn.onclick = () => {
      try {
        const temp = document.createElement('div');
        temp.contentEditable = 'true';
        temp.style.position = 'fixed';
        temp.style.left = '-9999px';
        temp.style.top = '0';
        temp.style.opacity = '0';
        temp.innerHTML = output || '';
        document.body.appendChild(temp);
        const range = document.createRange();
        range.selectNodeContents(temp);
        const selection = window.getSelection();
        selection.removeAllRanges();
        selection.addRange(range);
        const copied = document.execCommand('copy');
        selection.removeAllRanges();
        document.body.removeChild(temp);
        if (!copied) throw new Error('copy failed');
        status.textContent = 'Copied rich text for paste.';
      } catch (error) {
        console.error(error);
        status.textContent = 'Rich copy failed.';
      }
    };

    copyHtmlBtn.onclick = async () => {
      try {
        await navigator.clipboard.writeText(output || '');
        status.textContent = 'Copied HTML source.';
      } catch (error) {
        console.error(error);
        status.textContent = 'Copy failed.';
      }
    };

    downloadBtn.onclick = () => {
      const a = document.createElement('a');
      a.href = URL.createObjectURL(new Blob([output || ''], { type: 'text/html' }));
      a.download = 'index.html';
      a.click();
      status.textContent = 'HTML file downloaded.';
    };

    resetBtn.onclick = () => {
      fileInput.value = '';
      preview.innerHTML = '';
      htmlPreview.textContent = '';
      mappingPanel.style.display = 'none';
      headers = [];
      rows = [];
      output = '';
      status.textContent = 'Select a file to begin.';
      setActivePane('text');
    };

    updateAccept();
  </script>
</body>
</html>
